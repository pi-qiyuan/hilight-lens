<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="container">
    <div id="milestone-banner" class="banner hidden">
      <div class="banner-content">
        <span id="milestone-text"></span>
        <a href="#" id="milestone-link" class="banner-action" target="_blank"></a>
      </div>
      <button id="milestone-close" class="banner-close">&times;</button>
    </div>
    <header>
      <div class="header-main">
        <img src="assets/icon.png" class="logo">
        <h2 data-i18n="appName">Hilight Lens</h2>
      </div>
    </header>

    <div class="group-nav">
      <div class="group-selector-wrapper">
        <select id="group-selector"></select>
        <button id="delete-group-btn" class="icon-btn hidden" title="Delete current group">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
        <button id="add-group-toggle" title="Add Group">+</button>
      </div>
      <div id="new-group-panel" class="new-group-panel hidden">
        <input type="text" id="new-group-name" data-i18n-placeholder="newGroupPlaceholder" placeholder="New group name...">
        <button id="confirm-add-group" data-i18n="addButton">Add</button>
      </div>
    </div>

    <div id="add-toggle" class="add-toggle">
      <span class="icon">+</span>
      <span data-i18n="addNewLabel">Add New Keyword</span>
      <span class="arrow">▼</span>
    </div>

    <div id="step-container" class="step-container hidden">
      <input type="text" id="keyword" data-i18n-placeholder="keywordPlaceholder">
      
      <div class="scheme-section">
        <div id="scheme-toggle" class="scheme-toggle">
          <span data-i18n="presetsLabel">Advanced Options</span>
          <span class="arrow">▼</span>
        </div>

        <div id="scheme-container" class="scheme-content hidden">
          <div class="scheme-subtitle" data-i18n="selectColorSchemeLabel">Select Color Scheme</div>
          <div id="preset-grid" class="preset-grid">
            <!-- Swatches will be generated by JS -->
          </div>
          
          <div id="custom-toggle" class="custom-toggle">
            <span data-i18n="customLabel">Custom color</span>
            <span class="arrow">▼</span>
          </div>

          <div id="custom-colors-container" class="custom-colors hidden">
            <div class="color-item">
              <span class="label" data-i18n="bgColorLabel">Background</span>
              <input type="color" id="bg-color" value="#E8F5E9">
            </div>
            <div class="color-item">
              <span class="label" data-i18n="fgColorLabel">Text Color</span>
              <input type="color" id="fg-color" value="#2E7D32">
            </div>
          </div>

          <div class="group-select-section">
            <div class="scheme-subtitle" data-i18n="targetGroupLabel">Target Group</div>
            <select id="target-group-select"></select>
          </div>

          <div class="preview-container">
            <span class="preview-label" data-i18n="previewLabel">Preview:</span>
            <div id="preview-area" class="preview-area">
              <span id="preview-text" class="preview-mark">Keyword</span>
            </div>
          </div>
        </div>
      </div>

      <button id="add-btn" data-i18n="addButton">Add Keyword</button>
    </div>

    <div class="divider"></div>
    
    <ul id="keyword-list"></ul>
    
    <footer class="footer">
      <a href="https://hugbear.ai" id="more-tools-link" data-i18n="moreToolsLabel">More Tools</a>
      <span class="footer-separator">|</span>
      <a href="https://ko-fi.com/qiyuanyang" id="coffee-link" data-i18n="buyMeACoffeeLabel">❤️ Buy me a coffee</a>
    </footer>
  </div>
  <script src="js/constants.js"></script>
  <script src="js/store.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
