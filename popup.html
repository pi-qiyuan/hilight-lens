<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="assets/icon.png" class="logo">
      <h2 data-i18n="appName">Hilight Lens</h2>
    </header>

    <div id="add-toggle" class="add-toggle">
      <span class="icon">+</span>
      <span data-i18n="addNewLabel">Add New Keyword</span>
      <span class="arrow">▼</span>
    </div>

    <div id="step-container" class="step-container hidden">
      <input type="text" id="keyword" data-i18n-placeholder="keywordPlaceholder">
      
      <div class="scheme-section">
        <div id="scheme-toggle" class="scheme-toggle">
          <span data-i18n="presetsLabel">Advanced Options</span>
          <span class="arrow">▼</span>
        </div>

        <div id="scheme-container" class="scheme-content hidden">
          <div class="scheme-subtitle" data-i18n="selectColorSchemeLabel">Select Color Scheme</div>
          <div id="preset-grid" class="preset-grid">
            <!-- Swatches will be generated by JS -->
          </div>
          
          <div id="custom-toggle" class="custom-toggle">
            <span data-i18n="customLabel">Custom color</span>
            <span class="arrow">▼</span>
          </div>

          <div id="custom-colors-container" class="custom-colors hidden">
            <div class="color-item">
              <span class="label" data-i18n="bgColorLabel">Background</span>
              <input type="color" id="bg-color" value="#E8F5E9">
            </div>
            <div class="color-item">
              <span class="label" data-i18n="fgColorLabel">Text Color</span>
              <input type="color" id="fg-color" value="#2E7D32">
            </div>
          </div>

          <div class="preview-container">
            <span class="preview-label" data-i18n="previewLabel">Preview:</span>
            <div id="preview-area" class="preview-area">
              <span id="preview-text" class="preview-mark">Keyword</span>
            </div>
          </div>
        </div>
      </div>

      <button id="add-btn" data-i18n="addButton">Add Keyword</button>
    </div>

    <div class="divider"></div>
    
    <ul id="keyword-list"></ul>
    
    <footer class="footer">
      <a href="https://hugbear.ai" id="more-tools-link" data-i18n="moreToolsLabel">More Tools</a>
      <span class="footer-separator">|</span>
      <a href="https://ko-fi.com/qiyuanyang" id="coffee-link" data-i18n="buyMeACoffeeLabel">❤️ Buy me a coffee</a>
    </footer>
  </div>
  <script src="js/constants.js"></script>
  <script src="js/store.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
